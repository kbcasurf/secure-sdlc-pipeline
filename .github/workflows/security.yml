name: Secure SDLC Pipeline

# Runs the full DevSecOps control set on every push and PR. Scanning steps use
# `continue-on-error: true` so this demo stays green while still publishing
# findings (Security tab + artifacts). Flip a step to blocking by removing that
# line — that single change turns the stage into a hard quality gate.
#
# Every action is pinned to an immutable commit SHA with the human-readable
# version in a trailing comment — supply-chain hardening that satisfies the
# OpenSSF Scorecard "Pinned-Dependencies" check. Bump deliberately, never with a
# moving tag/branch.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab

jobs:
  # ---------------------------------------------------------------- SAST
  sast:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run Semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif app/
      - uses: github/codeql-action/upload-sarif@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # v4 (codeql-bundle-v2.26.1)
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ---------------------------------------------------------------- Secrets
  secrets:
    name: Secrets · Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_CONFIG: policies/gitleaks.toml

  # ---------------------------------------------------------------- SCA
  sca:
    name: SCA · Trivy + npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: npm audit
        continue-on-error: true
        working-directory: app
        run: npm install --package-lock-only && npm audit --audit-level=high
      - name: Trivy filesystem scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: app
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # v4 (codeql-bundle-v2.26.1)
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-sca

  # ---------------------------------------------------------------- IaC
  iac:
    name: IaC · Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Run Checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf # v12.1347.0
        with:
          directory: .
          output_format: sarif   # this action version writes results.sarif to the workspace root
      - uses: github/codeql-action/upload-sarif@e58424170fb0262c8d7ed60a2e84b9bffe205c67 # v4 (codeql-bundle-v2.26.1)
        if: always()
        with:
          sarif_file: results.sarif
          category: checkov

  # ---------------------------------------------------------------- SBOM
  sbom:
    name: SBOM · Syft (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./app
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cyclonedx.json

  # ---------------------------------------------------------------- DAST
  dast:
    name: DAST · OWASP ZAP baseline
    runs-on: ubuntu-latest
    needs: [sast, sca]   # scan the code before spending time on the running app
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Start the demo app
        run: docker compose up --build -d
      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break || sleep 2
          done
      - name: ZAP baseline scan
        continue-on-error: true
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: http://localhost:3000
          rules_file_name: policies/zap-rules.tsv
          cmd_options: '-a'
          allow_issue_writing: false
