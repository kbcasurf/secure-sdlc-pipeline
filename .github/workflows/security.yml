name: Secure SDLC Pipeline

# Runs the full DevSecOps control set on every push and PR. Scanning steps use
# `continue-on-error: true` so this demo stays green while still publishing
# findings (Security tab + artifacts). Flip a step to blocking by removing that
# line — that single change turns the stage into a hard quality gate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab

jobs:
  # ---------------------------------------------------------------- SAST
  sast:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif app/
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  # ---------------------------------------------------------------- Secrets
  secrets:
    name: Secrets · Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: policies/gitleaks.toml

  # ---------------------------------------------------------------- SCA
  sca:
    name: SCA · Trivy + npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: npm audit
        continue-on-error: true
        working-directory: app
        run: npm install --package-lock-only && npm audit --audit-level=high
      - name: Trivy filesystem scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-sca

  # ---------------------------------------------------------------- IaC
  iac:
    name: IaC · Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Checkov
        continue-on-error: true
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          output_format: sarif
          output_file_path: checkov.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

  # ---------------------------------------------------------------- SBOM
  sbom:
    name: SBOM · Syft (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ./app
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cyclonedx.json

  # ---------------------------------------------------------------- DAST
  dast:
    name: DAST · OWASP ZAP baseline
    runs-on: ubuntu-latest
    needs: [sast, sca]   # scan the code before spending time on the running app
    steps:
      - uses: actions/checkout@v4
      - name: Start the demo app
        run: docker compose up --build -d
      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && break || sleep 2
          done
      - name: ZAP baseline scan
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:3000
          rules_file_name: policies/zap-rules.tsv
          cmd_options: '-a'
          allow_issue_writing: false
